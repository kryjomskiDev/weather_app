name: weather_app
description: A new Flutter project.
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.11.5 <4.0.0"
  flutter: "3.41.9"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  bloc: 9.2.1
  flutter_bloc: 9.1.1
  intl: 0.20.2
  intl_utils: 2.8.14
  json_annotation: 4.11.0
  provider: "6.1.5+1"
  fimber_io: 0.7.0
  get_it: 9.2.1
  dio: 5.9.2
  flutter_secure_storage: 10.2.0
  injectable: 3.0.0
  collection: 1.19.1
  equatable: 2.0.8
  retrofit: 4.9.2
  go_router: 17.2.3
  hooked_bloc: 1.7.0
  flutter_hooks: "0.21.3+1"
  flutter_svg: 2.3.0
  system_proxy: 0.1.0
  shared_preferences: 2.5.5
  geolocator: 14.0.2
  bloc_presentation: 1.1.2+3
  firebase_core: 4.9.0
  firebase_analytics: 12.4.1
  firebase_crashlytics: 5.2.2
  firebase_auth: ^6.5.1


  nested: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: 6.0.0
  bloc_test: 10.0.0
  injectable_generator: 3.0.2
  retrofit_generator: 10.2.6
  build_runner: 2.15.0
  json_serializable: 6.13.2
  mockito: 5.6.4
  flutter_gen_runner: 5.12.0

  firebase_core_platform_interface: any
flutter:
  uses-material-design: true
  assets:
    - assets/images/svg/
  
  fonts:
  - family: Inter
    fonts:
    - asset: assets/fonts/Inter-Thin.ttf
    - asset: assets/fonts/Inter-ExtraLight.ttf
    - asset: assets/fonts/Inter-Light.ttf
    - asset: assets/fonts/Inter-Medium.ttf
    - asset: assets/fonts/Inter-Regular.ttf
    - asset: assets/fonts/Inter-SemiBold.ttf
    - asset: assets/fonts/Inter-Bold.ttf
    - asset: assets/fonts/Inter-ExtraBold.ttf
    - asset: assets/fonts/Inter-Black.ttf

flutter_intl:
  enabled: true
  class_name: Strings
  main_locale: en


flutter_gen:
  output: lib/generated/
